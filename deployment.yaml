# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joke-api
  labels:
    app: joke-api
spec:
  replicas: 3 # Run 3 copies of joke api
  selector:
    matchLabels:
      app: joke-api
  template:
    metadata:
      labels:
        app: joke-api
    spec:
      containers:
      - name: joke-api
        image: joke-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"